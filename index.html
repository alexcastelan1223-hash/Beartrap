<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bear Trap — Ropa que atrapa.</title>
<meta name="description" content="Bear Trap — Ropa americana, piezas únicas en México.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070708;
  --card:#111113;
  --border:#1e1e22;
  --text:#f5f5f5;
  --muted:#777;
  --orange:#ff8c00;
  --yellow:#ffc400;
  --green:#25d366;
  --wa-dark:#128c7e;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"DM Mono",monospace;
  cursor:none;
  overflow-x:hidden;
}

/* ── CURSOR ── */
#cur{
  position:fixed;
  width:22px;height:22px;
  border-radius:50%;
  border:2px solid rgba(255,140,0,.8);
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  transition:transform .08s ease, width .15s, height .15s, border-color .15s;
  mix-blend-mode:normal;
}
#cur.hover{width:38px;height:38px;border-color:var(--yellow);background:rgba(255,196,0,.08)}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:900;
  background:rgba(7,7,8,.93);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:58px;
}
.nav-logo-box{
  border:1px solid rgba(255,140,0,.35);
  border-radius:3px;
  padding:5px 10px;
  display:flex;align-items:center;gap:8px;
  text-decoration:none;
}
.nav-logo-text{
  display:flex;flex-direction:column;line-height:1;
  font-family:"Unbounded",sans-serif;font-size:11px;font-weight:700;color:#fff;
  letter-spacing:.06em;
}
.nav-logo-text span{font-size:8px;letter-spacing:.15em;color:var(--orange);margin-top:1px}
.nav-bear-icon{width:28px;height:28px}

.nav-links{
  display:flex;align-items:center;gap:32px;
  position:absolute;left:50%;transform:translateX(-50%);
}
.nav-link{
  font-family:"DM Mono",monospace;font-size:11px;font-weight:500;
  letter-spacing:.12em;color:#aaa;text-decoration:none;text-transform:uppercase;
  padding-bottom:4px;border-bottom:2px solid transparent;transition:all .2s;
}
.nav-link.active{color:#fff;border-bottom-color:var(--orange)}
.nav-link:hover{color:#fff}

.nav-right{display:flex;align-items:center;gap:16px}
.nav-social{
  display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.1em;
  text-decoration:none;color:#aaa;transition:color .2s;text-transform:uppercase;
}
.nav-social:hover{color:#fff}
.nav-social svg{width:14px;height:14px;fill:currentColor}
.nav-sep{width:1px;height:16px;background:var(--border)}
.nav-admin{
  width:7px;height:7px;border-radius:50%;
  background:transparent;border:1px solid #333;
  cursor:pointer;transition:border-color .2s;
}
.nav-admin:hover{border-color:#666}

/* ── HERO ── */
.hero{
  position:relative;
  min-height:calc(100vh - 58px);
  display:flex;align-items:center;
  overflow:hidden;
}
/* Background glows */
.hero::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 70% at 10% 80%, rgba(180,80,0,.55) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 25% 100%, rgba(100,40,0,.4) 0%, transparent 50%),
    radial-gradient(ellipse 50% 60% at 80% 30%, rgba(60,20,100,.6) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 90% 60%, rgba(0,80,120,.5) 0%, transparent 50%),
    radial-gradient(ellipse 30% 30% at 70% 80%, rgba(0,60,80,.3) 0%, transparent 50%);
  z-index:0;
}

.hero-left{
  position:relative;z-index:1;
  padding:80px 0 80px 60px;
  flex:0 0 55%;
}
.hero-right{
  position:relative;z-index:1;
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding-right:40px;
}

/* Title */
.hero-bear-text{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(100px,12vw,160px);
  line-height:.88;
  background:linear-gradient(160deg,#ffdd00 0%,#ff9000 40%,#ff5500 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  display:block;
  margin-bottom:0;
}

.hero-slogan{
  margin-top:18px;
  font-size:17px;
  font-style:italic;
  color:#ccc;
  font-family:sans-serif;
  font-weight:400;
}
.hero-slogan strong{color:var(--orange);font-style:italic}

/* Rainbow stripe */
.rainbow-stripe{
  display:flex;gap:4px;margin-top:20px;margin-bottom:28px;
}
.rs{height:5px;border-radius:3px}

/* Buttons */
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-catalog{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#000;font-weight:700;
  font-family:"DM Mono",monospace;font-size:13px;letter-spacing:.06em;
  border-radius:3px;text-decoration:none;border:none;cursor:none;
  transition:all .2s;
}
.btn-catalog:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,140,0,.35)}
.btn-whatsapp{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;
  background:transparent;
  color:#ddd;font-family:"DM Mono",monospace;font-size:13px;letter-spacing:.06em;
  border:1px solid rgba(255,255,255,.25);border-radius:3px;
  text-decoration:none;cursor:none;transition:all .2s;
}
.btn-whatsapp:hover{border-color:var(--green);color:var(--green)}
.btn-whatsapp svg{width:16px;height:16px;fill:currentColor}

/* ── 3D BEAR SVG ── */
.bear-container{
  position:relative;
  width:360px;height:360px;
  animation:float 5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* Bear glow */
.bear-glow{
  position:absolute;
  width:280px;height:280px;
  border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(120,60,180,.4) 0%,rgba(0,120,180,.3) 40%,transparent 70%);
  filter:blur(20px);
}

/* Sparkles */
.spark{position:absolute;pointer-events:none}
.spark-star{font-size:20px;animation:sparkle 3s ease-in-out infinite}
.spark-dot{border-radius:50%;animation:sparkle 3s ease-in-out infinite}
@keyframes sparkle{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

/* ── CATALOG ── */
.section{padding:80px 0;max-width:1400px;margin:0 auto;padding-left:32px;padding-right:32px}
.section-header{margin-bottom:40px}
.section-label{font-size:10px;letter-spacing:.2em;color:var(--orange);text-transform:uppercase;margin-bottom:8px}
.section-title{font-family:"Bebas Neue",sans-serif;font-size:clamp(32px,4vw,52px);letter-spacing:.04em;color:#fff}
.section-line{height:2px;width:50px;background:linear-gradient(90deg,var(--orange),var(--yellow));margin-top:10px}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.filt{
  padding:6px 18px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.08em;
  cursor:none;transition:all .2s;
}
.filt.on,.filt:hover{border-color:var(--orange);color:var(--orange);background:rgba(255,140,0,.07)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

/* Card */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px;overflow:hidden;
  transition:all .22s;cursor:none;position:relative;
}
.card:hover{border-color:rgba(255,140,0,.3);transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.5)}
.card-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#1a1a1a}
.card-ph{
  width:100%;aspect-ratio:3/4;
  background:linear-gradient(145deg,#161618,#1e1e22);
  display:flex;align-items:center;justify-content:center;font-size:48px;
}
.card-body{padding:12px}
.card-cat{font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.card-name{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.03em;line-height:1.1;margin-bottom:8px}
.card-price{font-size:22px;font-weight:700;color:var(--yellow);margin-bottom:9px}
.card-sizes{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.sz{padding:2px 7px;border:1px solid var(--border);border-radius:2px;font-size:9px;color:var(--muted)}
.btn-consult{
  width:100%;padding:9px;border:none;border-radius:2px;
  background:linear-gradient(135deg,var(--green),var(--wa-dark));
  color:#fff;font-family:"Bebas Neue",sans-serif;font-size:14px;letter-spacing:.08em;
  cursor:none;transition:opacity .18s;
}
.btn-consult:hover{opacity:.86}
.sold-badge{
  position:absolute;top:10px;right:10px;
  background:linear-gradient(135deg,#ff2d78,#b24bff);
  color:#fff;font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:.1em;
  padding:3px 10px;border-radius:2px;
}

/* Loading */
#loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:100px 0;color:var(--muted);font-size:12px;letter-spacing:.1em;
}
.spin{
  width:30px;height:30px;border-radius:50%;
  border:2px solid var(--border);border-top-color:var(--orange);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#empty{display:none;text-align:center;padding:80px;color:var(--muted);font-size:12px;letter-spacing:.1em}

/* ── FLOAT BUTTONS ── */
.floats{position:fixed;bottom:22px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:500}
.float-pill{
  display:flex;align-items:center;gap:8px;
  padding:10px 18px;border-radius:30px;
  font-size:12px;font-weight:700;letter-spacing:.06em;
  text-decoration:none;transition:transform .2s;
  box-shadow:0 4px 18px rgba(0,0,0,.45);
}
.float-pill:hover{transform:scale(1.06)}
.fp-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.fp-wa{background:linear-gradient(135deg,var(--green),var(--wa-dark));color:#fff}
.float-pill svg{width:16px;height:16px;fill:currentColor}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);
  padding:28px 32px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;
}
.footer-logo{
  font-family:"Unbounded",sans-serif;font-size:12px;font-weight:700;
  background:linear-gradient(135deg,#ffdd00,#ff9000,#ff5500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.footer-info{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:#fff}

@media(max-width:768px){
  .hero-left{padding:60px 24px}
  .hero{flex-direction:column}
  .hero-right{padding:0 24px 60px}
  .bear-container{width:260px;height:260px}
  .nav-links{display:none}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .section{padding:60px 20px}
}
</style>
</head>

<div id="cur"></div>

    <!-- Rainbow stripe -->

      <div class="rs" style="width:60px;background:linear-gradient(90deg,#00e87a,#00c8ff)"></div>
      <div class="rs" style="width:55px;background:linear-gradient(90deg,#00c8ff,#0080ff)"></div>
      <div class="rs" style="width:50px;background:linear-gradient(90deg,#cc00ff,#ff2d78)"></div>

  <!-- RIGHT — 3D BEAR -->

    <div class="bear-container">
      <div class="bear-glow"></div>

        <span class="spark-star" style="color:#ff2d78;font-size:22px">★</span>
      </div>
      <div class="spark" style="top:6%;right:14%;animation-delay:.8s">
        <span class="spark-star" style="color:#ffd600;font-size:26px">★</span>
      </div>
      <div class="spark" style="top:38%;right:5%;animation-delay:.5s">
        <span class="spark-star" style="color:#f0f0f0;font-size:14px">✦</span>

<script>
const FB = "https://bear-trap-bazar-default-rtdb.firebaseio.com";

// Default fallback items (no photos - just structure)
const FALLBACK_COUNT = 212;
const CATS = ["Blusas","Suéteres","Chamarras","Pantalones","Faldas","Vestidos","Shorts","Conjuntos"];

let allItems = [];
let curFilter = "Todas";
let cfg = { ig: "@beartrap_mx", wa: "5215512345678" };

// ── CURSOR ──
const cur = document.getElementById("cur");
document.addEventListener("mousemove", e => {
  cur.style.left = e.clientX + "px";
  cur.style.top = e.clientY + "px";
});
document.addEventListener("mouseover", e => {
  if(e.target.closest("a,button,.card,.filt")) cur.classList.add("hover");
  else cur.classList.remove("hover");
});

// ── CONFIG ──
function applyConfig() {
  const waUrl = `https://wa.me/${cfg.wa}`;
  const igUrl = `https://instagram.com/${cfg.ig.replace("@","")}`;
  document.getElementById("nav-ig").href = igUrl;
  document.getElementById("nav-wa").href = waUrl;
  document.getElementById("hero-wa").href = waUrl;
  document.getElementById("fl-ig").href = igUrl;
  document.getElementById("fl-wa").href = waUrl;
  document.getElementById("footer-ig").href = igUrl;
  document.getElementById("footer-ig").textContent = cfg.ig;
}

// ── LOAD ──
async function load() {
  try {
    // Load config
    const cfgRes = await fetch(`${FB}/config.json`, {cache:"no-store"});
    if(cfgRes.ok) {
      const c = await cfgRes.json();
      if(c) { cfg = {...cfg,...c}; }
    }
    applyConfig();

    // Load items
    const res = await fetch(`${FB}/items.json`, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    if(data) {
      const arr = Array.isArray(data) ? data : Object.values(data);
      allItems = arr.filter(i => i && i.visible !== false);
      if(allItems.length === 0) throw new Error("empty");
    } else {
      throw new Error("null");
    }

    document.getElementById("loading").style.display = "none";
    render();
  } catch(e) {
    console.warn("Firebase:", e.message);
    // Show message to seed Firebase
    document.getElementById("loading").innerHTML =
      `<div style="text-align:center;color:#666;font-size:12px;letter-spacing:.1em">
        <div style="font-size:32px;margin-bottom:12px">🐻</div>
        Catálogo vacío — sube el inventario desde el admin.
      </div>`;
  }
}

// ── FILTER ──
function setF(btn, cat) {
  document.querySelectorAll(".filt").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  curFilter = cat;
  render();
}

function filterCat(cat, link) {
  document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
  link.classList.add("active");
  document.querySelectorAll(".filt").forEach(b => {
    b.classList.toggle("on", b.textContent === cat || (cat === "Todas" && b.textContent === "Todas"));
  });
  curFilter = cat === "Conjuntos" ? "Conjuntos" : "Todas";
  render();
  document.getElementById("catalogo").scrollIntoView({behavior:"smooth"});
}

// ── RENDER ──
function render() {
  const visible = allItems.filter(i =>
    curFilter === "Todas" || i.categoria === curFilter
  );

  const empty = document.getElementById("empty");
  const grid = document.getElementById("grid");

  if(!visible.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  const waBase = `https://wa.me/${cfg.wa}`;

  grid.innerHTML = visible.map(item => {
    const img = item.foto
      ? `<img class="card-img" src="${item.foto}" alt="${item.nombre}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-ph" style="display:none">🐻</div>`
      : `<div class="card-ph">🐻</div>`;

    const sizes = (item.tallas||[]).map(t => `<span class="sz">${t}</span>`).join("");
    const sold = item.vendida ? `<div class="sold-badge">VENDIDO</div>` : "";
    const msg = encodeURIComponent(`Hola! Me interesa: ${item.nombre} — $${item.precio} MXN`);

    return `<div class="card">
      ${img}${sold}
      <div class="card-body">
        <div class="card-cat">${item.categoria||""}</div>
        <div class="card-name">${item.nombre}</div>
        <div class="card-price">$${item.precio} MXN</div>
        <div class="card-sizes">${sizes}</div>
        ${!item.vendida
          ? `<button class="btn-consult" onclick="window.open('${waBase}?text=${msg}','_blank')">💬 CONSULTAR</button>`
          : `<div style="text-align:center;color:#555;font-size:11px;padding:8px;letter-spacing:.08em">AGOTADA</div>`
        }
      </div>
    </div>`;
  }).join("");
}

// Init
applyConfig();
load();
</script>
