<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bear Trap — Ropa que atrapa.</title>
<meta name="description" content="Bear Trap - Ropa americana de piezas únicas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--card:#111;--border:#1a1a1a;--white:#f0f0f0;--dim:#666;
  --accent:#ff6b35;--cyan:#00e5ff;--green:#39ff14;--pink:#ff2d7b;
  --yellow:#ffe600;--purple:#b24dff;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Unbounded',sans-serif;min-height:100vh;overflow-x:hidden}
.stripe{height:3px;background:linear-gradient(90deg,#ff6b35,#ff2d7b,#b24dff,#00e5ff,#39ff14,#ffe600,#ff6b35);background-size:300% 100%;animation:flow 4s linear infinite}
@keyframes flow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo span{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white)}
.nav-dot{color:rgba(255,255,255,.03);text-decoration:none;font-size:8px;cursor:default}
.nav-dot:hover{color:rgba(255,255,255,.15)}
.hero{text-align:center;padding:60px 20px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 80%,rgba(255,107,53,.06) 0%,transparent 50%);pointer-events:none}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,12vw,96px);letter-spacing:6px;line-height:.9;background:linear-gradient(135deg,#ff6b35,#ff2d7b,#b24dff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(11px,2.5vw,14px);color:var(--dim);letter-spacing:4px;margin-top:10px;font-weight:300}
.bear-hero{width:80px;height:80px;margin:0 auto 16px}
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:16px 20px 20px;position:sticky;top:57px;z-index:90;background:rgba(10,10,10,.92);backdrop-filter:blur(8px)}
.fbtn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Unbounded',sans-serif;font-size:10px;cursor:pointer;transition:all .25s;letter-spacing:.5px}
.fbtn:hover,.fbtn.on{border-color:var(--accent);color:var(--white);background:rgba(255,107,53,.1)}
.fbtn.on{font-weight:700}
.search-bar{max-width:400px;margin:0 auto 20px;padding:0 20px}
.search-bar input{width:100%;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Unbounded',sans-serif;font-size:12px;outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--dim)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:0 20px 80px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .3s;position:relative}
.card:hover{border-color:rgba(255,107,53,.3);transform:translateY(-4px);box-shadow:0 12px 40px rgba(255,107,53,.08)}
.card.sold::after{content:'VENDIDO';position:absolute;top:12px;right:12px;background:var(--pink);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;padding:3px 10px;border-radius:3px;z-index:2}
.card-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#1a1a1a}
.card-img-ph{width:100%;aspect-ratio:3/4;background:linear-gradient(135deg,#1a1a1a,#222);display:flex;align-items:center;justify-content:center;font-size:48px;color:#333}
.card-body{padding:12px 14px 14px}
.card-cat{font-size:9px;letter-spacing:1.5px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px;font-weight:700;text-transform:uppercase}
.card-name{font-size:12px;font-weight:400;margin-bottom:3px;line-height:1.3}
.card-color{font-size:10px;color:var(--dim);margin-bottom:6px}
.card-price{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:1px}
.cat-Vestidos{background:rgba(178,77,255,.15);color:#b24dff}
.cat-Blusas{background:rgba(255,45,123,.15);color:#ff2d7b}
.cat-Sudaderas{background:rgba(100,200,255,.15);color:#64c8ff}
.cat-Hoodies{background:rgba(0,100,255,.15);color:#4488ff}
.cat-Chamarras{background:rgba(140,80,200,.15);color:#9050c8}
.cat-Pantalones{background:rgba(160,100,255,.15);color:#a064ff}
.cat-Leggings{background:rgba(255,150,50,.15);color:#ff9632}
.cat-Joggers{background:rgba(57,255,20,.15);color:#39ff14}
.cat-Playeras{background:rgba(255,60,60,.15);color:#ff3c3c}
.cat-Shorts{background:rgba(0,210,210,.15);color:#00d2d2}
.cat-Faldas{background:rgba(255,230,0,.15);color:#ffe600}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.lb.open{display:flex}
.lb-inner{max-width:90vw;max-height:90vh;position:relative}
.lb-inner img{max-width:100%;max-height:85vh;border-radius:6px}
.lb-close{position:absolute;top:-36px;right:0;font-size:28px;color:var(--white);cursor:pointer;background:none;border:none}
.lb-info{text-align:center;margin-top:12px}
.lb-name{font-size:14px;font-weight:400}
.lb-price{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);margin-top:4px}
.lb-wa{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 20px;background:rgba(57,255,20,.12);border:1px solid rgba(57,255,20,.3);border-radius:6px;color:var(--green);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.5px;transition:all .2s}
.lb-wa:hover{background:rgba(57,255,20,.2)}
.float-btns{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:150}
.float-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:30px;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.5px;transition:all .3s;border:1px solid;font-family:'Unbounded',sans-serif}
.float-ig{background:rgba(255,45,123,.1);border-color:rgba(255,45,123,.3);color:var(--pink)}
.float-ig:hover{background:rgba(255,45,123,.2)}
.float-wa{background:rgba(57,255,20,.1);border-color:rgba(57,255,20,.3);color:var(--green)}
.float-wa:hover{background:rgba(57,255,20,.2)}
.footer{text-align:center;padding:30px 20px;border-top:1px solid var(--border);color:var(--dim);font-size:10px;letter-spacing:1px}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--dim);font-size:13px}
.loading{grid-column:1/-1;text-align:center;padding:80px 20px}
.loading-bear{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}
.loading p{color:var(--dim);font-size:11px;margin-top:12px;letter-spacing:1px}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 80px}
  .card-body{padding:8px 10px 10px}
  .card-name{font-size:11px}
  .card-price{font-size:18px}
  .hero{padding:40px 16px 24px}
  .float-btn span.fl{display:none}
}
</style>
</head>
<body>
<div class="stripe"></div>
<nav class="nav">
  <a class="nav-logo" href="/">
    <svg width="36" height="36" viewBox="0 0 100 100"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b35"/><stop offset="50%" stop-color="#ff2d7b"/><stop offset="100%" stop-color="#39ff14"/></linearGradient></defs><rect x="15" y="25" width="70" height="60" rx="14" fill="url(#bg)"/><circle cx="30" cy="22" r="12" fill="url(#bg)"/><circle cx="70" cy="22" r="12" fill="url(#bg)"/><circle cx="30" cy="22" r="6" fill="#0a0a0a"/><circle cx="70" cy="22" r="6" fill="#0a0a0a"/><circle cx="38" cy="48" r="5" fill="#0a0a0a"/><circle cx="62" cy="48" r="5" fill="#0a0a0a"/><ellipse cx="50" cy="60" rx="8" ry="5" fill="#0a0a0a"/><circle cx="50" cy="58" r="3" fill="#333"/><path d="M42 68 Q50 76 58 68" stroke="#0a0a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="30,85 35,78 40,85" fill="#ff6b35"/><polygon points="42,85 47,78 52,85" fill="#ffe600"/><polygon points="54,85 59,78 64,85" fill="#39ff14"/><polygon points="66,85 71,78 76,85" fill="#00e5ff"/></svg>
    <span>BEAR TRAP</span>
  </a>
  <a href="gestion/" class="nav-dot">&middot;</a>
</nav>
<section class="hero">
  <div class="bear-hero">
    <svg viewBox="0 0 100 100" width="80" height="80"><defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b35"/><stop offset="50%" stop-color="#ff2d7b"/><stop offset="100%" stop-color="#b24dff"/></linearGradient></defs><rect x="15" y="25" width="70" height="60" rx="14" fill="url(#hg)" opacity=".15"/><circle cx="30" cy="22" r="12" fill="url(#hg)" opacity=".15"/><circle cx="70" cy="22" r="12" fill="url(#hg)" opacity=".15"/><circle cx="38" cy="48" r="4" fill="rgba(255,255,255,.2)"/><circle cx="62" cy="48" r="4" fill="rgba(255,255,255,.2)"/><ellipse cx="50" cy="58" rx="6" ry="4" fill="rgba(255,255,255,.15)"/><path d="M42 66 Q50 74 58 66" stroke="rgba(255,255,255,.15)" stroke-width="2" fill="none"/></svg>
  </div>
  <h1>BEAR TRAP</h1>
  <p>ROPA QUE ATRAPA.</p>
</section>
<div class="search-bar"><input type="text" id="si" placeholder="Buscar prenda..."></div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid">
  <div class="loading"><svg class="loading-bear" viewBox="0 0 100 100" width="60" height="60"><defs><linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b35"/><stop offset="100%" stop-color="#ff2d7b"/></linearGradient></defs><rect x="15" y="25" width="70" height="60" rx="14" fill="url(#lg2)"/><circle cx="30" cy="22" r="12" fill="url(#lg2)"/><circle cx="70" cy="22" r="12" fill="url(#lg2)"/><circle cx="38" cy="48" r="5" fill="#0a0a0a"/><circle cx="62" cy="48" r="5" fill="#0a0a0a"/><path d="M42 68 Q50 76 58 68" stroke="#0a0a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg><p>Cargando catálogo...</p></div>
</div>
<div class="float-btns">
  <a class="float-btn float-ig" id="f-ig" href="#" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg><span class="fl">Instagram</span></a>
  <a class="float-btn float-wa" id="f-wa" href="#" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg><span class="fl">WhatsApp</span></a>
</div>
<div class="lb" id="lb" onclick="cLB(event)"><div class="lb-inner" id="lb-inner"></div></div>
<footer class="footer">BEAR TRAP &copy; 2026 — Piezas únicas.</footer>

<script>
const FB="https://bear-trap-bazar-default-rtdb.firebaseio.com";
let ITEMS=[],curCat="Todas",srch="";
const CC={"Vestidos":"#b24dff","Blusas":"#ff2d7b","Sudaderas":"#64c8ff","Hoodies":"#4488ff","Chamarras":"#9050c8","Pantalones":"#a064ff","Leggings":"#ff9632","Joggers":"#39ff14","Playeras":"#ff3c3c","Shorts":"#00d2d2","Faldas":"#ffe600"};

// ── Load config from Firebase ──
fetch(FB+"/config.json").then(r=>r.json()).then(c=>{
  if(c){
    const ig=c.ig||"@beartrap_mx";
    const wa=c.wa||"5215512345678";
    document.getElementById("f-ig").href="https://instagram.com/"+ig.replace("@","");
    document.getElementById("f-wa").href="https://wa.me/"+wa;
  }
}).catch(()=>{});

// ── Load items from Firebase ──
fetch(FB+"/items.json").then(r=>r.json()).then(data=>{
  if(data){
    // Firebase puede devolver objeto o array
    if(Array.isArray(data)){
      ITEMS=data.filter(Boolean);
    }else{
      ITEMS=Object.values(data).filter(Boolean);
    }
  }
  buildFilters();
  render();
}).catch(e=>{
  console.error("Error cargando datos:",e);
  document.getElementById("grid").innerHTML='<div class="empty">Error cargando el catálogo. Intenta de nuevo.</div>';
});

function buildFilters(){
  const vis=ITEMS.filter(i=>i.visible!==false);
  const cats=["Todas",...[...new Set(vis.map(i=>i.cat))].sort()];
  const fc=document.getElementById("filters");
  fc.innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.className="fbtn"+(c==="Todas"?" on":"");
    b.textContent=c;
    b.onclick=()=>{curCat=c;document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");render()};
    fc.appendChild(b);
  });
}

function render(){
  const g=document.getElementById("grid");
  const vis=ITEMS.filter(i=>i.visible!==false);
  const f=vis.filter(i=>{
    const mc=curCat==="Todas"||i.cat===curCat;
    const ms=!srch||(i.nombre||"").toLowerCase().includes(srch)||(i.color||"").toLowerCase().includes(srch)||(i.cat||"").toLowerCase().includes(srch);
    return mc&&ms;
  });
  if(!f.length){g.innerHTML='<div class="empty">No se encontraron prendas.</div>';return;}
  g.innerHTML=f.map(i=>{
    const sold=i.vendido?' sold':'';
    const imgH=i.img?'<img class="card-img" src="'+i.img+'" alt="'+i.nombre+'" loading="lazy">':'<div class="card-img-ph">🐻</div>';
    return '<div class="card'+sold+'" onclick="oLB('+i.id+')">'+imgH+'<div class="card-body"><span class="card-cat cat-'+i.cat+'">'+i.cat+'</span><div class="card-name">'+i.nombre+'</div><div class="card-color">'+i.color+'</div><div class="card-price">$'+i.precio+' MXN</div></div></div>';
  }).join("");
}

function oLB(id){
  const i=ITEMS.find(x=>x.id===id);if(!i)return;
  const wa=document.getElementById("f-wa").href.split("wa.me/")[1]||"5215512345678";
  const imgH=i.img?'<img src="'+i.img+'" alt="'+i.nombre+'">':'<div style="width:300px;height:400px;background:#1a1a1a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:64px;color:#333">🐻</div>';
  const waMsg=encodeURIComponent("Hola! Me interesa: "+i.nombre+" ($"+i.precio+" MXN)");
  document.getElementById("lb-inner").innerHTML='<button class="lb-close" onclick="cLB(null,true)">&times;</button>'+imgH+'<div class="lb-info"><div class="lb-name">'+i.nombre+' — '+i.color+'</div><div class="lb-price">$'+i.precio+' MXN</div>'+(i.vendido?'<div style="margin-top:8px;color:#ff2d7b;font-size:12px;font-weight:700;letter-spacing:1px">VENDIDO</div>':'<a class="lb-wa" href="https://wa.me/'+wa+'?text='+waMsg+'" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg> Preguntar por WhatsApp</a>')+'</div>';
  document.getElementById("lb").classList.add("open");document.body.style.overflow="hidden";
}
function cLB(e,f){if(f||(e&&e.target===document.getElementById("lb"))){document.getElementById("lb").classList.remove("open");document.body.style.overflow="";}}
document.getElementById("si").addEventListener("input",e=>{srch=e.target.value.toLowerCase();render()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")cLB(null,true)});
</script>
</body>
</html>
