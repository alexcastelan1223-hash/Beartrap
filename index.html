<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070708;--card:#111114;--border:#1e1e22;--text:#f0f0f0;--muted:#555}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;cursor:none;overflow-x:hidden}
#cur{position:fixed;width:18px;height:18px;border-radius:50%;pointer-events:none;z-index:99999;
  border:1.5px solid rgba(255,165,0,.75);top:0;left:0;transform:translate(-50%,-50%);
  transition:width .15s,height .15s}
#cur.big{width:30px;height:30px;border-color:rgba(255,193,7,1)}
nav{position:fixed;top:0;left:0;right:0;z-index:900;height:58px;display:flex;align-items:center;
  padding:0 28px;background:rgba(7,7,8,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.05)}
.nlogo{border:1px solid rgba(255,255,255,.14);border-radius:4px;padding:5px 10px;
  display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nlogo-bear{width:26px;height:26px}
.nlt{display:flex;flex-direction:column;line-height:1.1}
.nlb{font-family:"Unbounded",sans-serif;font-size:9px;font-weight:900;
  background:linear-gradient(135deg,#ff8c00,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nlt2{font-family:"Unbounded",sans-serif;font-size:9px;font-weight:900;
  background:linear-gradient(135deg,#ffc107,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nctr{flex:1;display:flex;justify-content:center;gap:32px}
.nl{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.45);text-decoration:none;position:relative;padding:4px 0;transition:color .2s}
.nl.on{color:#fff}
.nl.on::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#ff8c00,#ffc107);border-radius:2px}
.nl:hover:not(.on){color:rgba(255,255,255,.75)}
.nright{display:flex;align-items:center;gap:14px;flex-shrink:0}
.nsoc{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.45);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .2s}
.nsoc:hover{color:#fff}
.nsep{color:rgba(255,255,255,.08);font-size:14px}
.ndot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.12);cursor:pointer;margin-left:4px;transition:background .2s}
.ndot:hover{background:rgba(255,255,255,.35)}
.hero{min-height:100vh;display:flex;align-items:center;padding:90px 60px 60px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 65% at 12% 58%,rgba(170,70,0,.48) 0%,transparent 65%),
    radial-gradient(ellipse 45% 55% at 82% 38%,rgba(90,0,160,.5) 0%,transparent 60%),
    radial-gradient(ellipse 35% 40% at 78% 72%,rgba(0,30,100,.3) 0%,transparent 55%);
  pointer-events:none}
.hleft{position:relative;z-index:2;flex:0 0 auto}
.htitle{font-family:"Bebas Neue",sans-serif;font-size:clamp(90px,13vw,175px);line-height:.88;
  background:linear-gradient(180deg,#ffcc00 0%,#ff7700 55%,#ff3300 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.hslogan{font-family:"DM Sans",sans-serif;font-style:italic;font-size:clamp(16px,1.8vw,21px);
  color:rgba(255,255,255,.8);margin-bottom:26px}
.hslogan strong{color:#ff9500;font-weight:700;font-style:italic}
.hstripe{display:flex;height:5px;width:300px;border-radius:3px;overflow:hidden;margin-bottom:30px;gap:2px}
.hstripe span{flex:1;height:100%}
.s1{background:#ff3b30}.s2{background:#ff8c00}.s3{background:#34c759}
.s4{background:#30d5c8}.s5{background:#af52de}.s6{background:#ff2d55}
.hbtns{display:flex;gap:12px;flex-wrap:wrap}
.bcat{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;
  background:linear-gradient(135deg,#ffcc00,#ff8c00);border:none;border-radius:4px;
  color:#000;font-weight:700;font-size:14px;letter-spacing:.04em;cursor:none;transition:all .2s;text-decoration:none}
.bcat:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,140,0,.35)}
.bwa2{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:4px;
  color:rgba(255,255,255,.75);font-weight:600;font-size:14px;letter-spacing:.04em;
  cursor:none;transition:all .2s;text-decoration:none}
.bwa2:hover{border-color:rgba(37,211,102,.4);color:#25d366;transform:translateY(-2px)}
/* BEAR */
.hbear{position:absolute;right:5%;top:50%;transform:translateY(-50%);z-index:2;width:340px;animation:flt 5s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(-50%)}50%{transform:translateY(calc(-50% - 14px))}}
.bglow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(90,0,170,.5) 0%,rgba(0,30,110,.3) 40%,transparent 70%);
  filter:blur(28px);animation:gp 4s ease-in-out infinite}
@keyframes gp{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
.sp{position:absolute;animation:spk 3s ease-in-out infinite}
@keyframes spk{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.sp1{top:6%;right:20%;font-size:26px;color:#ffd700;animation-delay:0s}
.sp2{top:22%;left:3%;font-size:20px;color:#ff2d78;animation-delay:.5s}
.sp3{top:38%;right:2%;font-size:14px;color:#ffd700;animation-delay:.8s}
.sp4{top:62%;right:0;font-size:10px;color:#00c8ff;animation-delay:1.2s}
.sp5{bottom:20%;left:6%;width:9px;height:9px;border-radius:50%;background:#00ff87;animation-delay:.3s}
.sp6{bottom:32%;right:8%;width:11px;height:11px;border-radius:50%;background:#1e90ff;animation-delay:.9s}
.sp7{bottom:12%;right:22%;width:7px;height:7px;border-radius:50%;background:#b24bff;animation-delay:1.5s}
.sp8{top:52%;left:1%;width:6px;height:6px;border-radius:50%;background:#00dfff;animation-delay:.6s}
/* SECTIONS */
.sw{max-width:1380px;margin:0 auto;padding:0 28px}
.shdr{padding:70px 0 28px;display:flex;align-items:flex-end;gap:16px}
.sname{font-family:"Bebas Neue",sans-serif;font-size:clamp(30px,4vw,50px);letter-spacing:.05em}
.sbar{flex:1;height:1px;background:var(--border);margin-bottom:7px}
.scnt{font-size:11px;color:var(--muted);letter-spacing:.1em;padding-bottom:5px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.fb{padding:6px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.08em;font-family:"DM Sans",sans-serif;cursor:none;transition:all .2s}
.fb.on,.fb:hover{border-color:rgba(255,140,0,.5);color:#ff9500;background:rgba(255,140,0,.06)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;padding-bottom:60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:all .22s;position:relative}
.card:hover{border-color:rgba(255,140,0,.3);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.cimgw{width:100%;aspect-ratio:3/4;overflow:hidden;background:#16161a;position:relative}
.cimg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .cimg{transform:scale(1.04)}
.cph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#13131a,#1e1e2a);gap:8px}
.cph-ico{font-size:40px;opacity:.3}
.cph-txt{font-size:9px;letter-spacing:.14em;color:rgba(255,255,255,.15);text-transform:uppercase}
.cbody{padding:12px}
.ccat{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.cname{font-weight:700;font-size:14px;line-height:1.25;margin-bottom:8px;color:#eee}
.cbot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:10px}
.cprice{font-family:"Bebas Neue",sans-serif;font-size:22px;
  background:linear-gradient(135deg,#ffc107,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ctallas{display:flex;gap:3px;flex-wrap:wrap}
.talla{padding:2px 6px;border:1px solid var(--border);border-radius:3px;font-size:9px;color:var(--muted)}
.bwa-card{width:100%;padding:9px;border:none;border-radius:4px;
  background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;
  font-weight:700;font-size:12px;letter-spacing:.06em;cursor:none;transition:opacity .2s;font-family:"DM Sans",sans-serif}
.bwa-card:hover{opacity:.88}
.sold-badge{position:absolute;top:10px;left:10px;
  background:linear-gradient(135deg,#ff2d78,#b24bff);
  color:#fff;font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 10px;border-radius:3px}
.float-pills{position:fixed;bottom:24px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:800}
.pill{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:30px;
  font-weight:700;font-size:12px;letter-spacing:.06em;text-decoration:none;
  transition:transform .2s;box-shadow:0 4px 16px rgba(0,0,0,.4);font-family:"DM Sans",sans-serif}
.pill:hover{transform:scale(1.06) translateX(-3px)}
.pill-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.pill-wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}
footer{border-top:1px solid var(--border);padding:28px;text-align:center}
.flogo{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.12em;
  background:linear-gradient(135deg,#ff8c00,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
footer p{font-size:11px;color:var(--muted);letter-spacing:.1em}
@media(max-width:900px){
  .hero{padding:90px 28px 60px}
  .hbear{position:relative;right:auto;top:auto;transform:none;width:260px;margin:40px auto 0;animation:flt2 5s ease-in-out infinite}
  @keyframes flt2{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .nctr{display:none}
}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  nav{padding:0 16px}
  .hstripe{width:100%}
  .htitle{font-size:clamp(80px,20vw,120px)}
}
</style>

<script>
const FB="https://bear-trap-bazar-default-rtdb.firebaseio.com";
let metadata=[],photos={},cfg={ig:"@beartrapbazar",wa:"5215512345678"},subfilters={ra:"",ss:"",pe:""};

// CURSOR
const cur=document.getElementById("cur");
document.addEventListener("mousemove",e=>{cur.style.left=e.clientX+"px";cur.style.top=e.clientY+"px"});
document.addEventListener("mouseover",e=>{
  if(e.target.matches("a,button,.card,.ndot"))cur.classList.add("big");
  else cur.classList.remove("big");
});

// NAV ACTIVE
window.addEventListener("scroll",()=>{
  const secs=[["ropa-americana","nl-ra"],["street-syndicate","nl-ss"],["personalizaciones","nl-pe"]];
  let cur2=0;
  secs.forEach(([id],i)=>{const el=document.getElementById(id);if(el&&el.getBoundingClientRect().top<120)cur2=i;});
  secs.forEach(([,nid],i)=>document.getElementById(nid).classList.toggle("on",i===cur2));
});

async function fbGet(path){
  const r=await fetch(`${FB}/${path}.json`,{cache:"no-store"});
  if(!r.ok)throw Error(r.status);
  return r.json();
}

async function init(){
  try{
    [metadata,photos]=await Promise.all([fbGet("items"),fbGet("photos")]);
    if(!metadata||!Array.isArray(metadata))metadata=[];
    if(!photos)photos={};
    const c=await fbGet("config");
    if(c)cfg={...cfg,...c};
  }catch(e){console.warn("Firebase:",e.message);}
  applyConfig();
  render();
}

function applyConfig(){
  const wa="https://wa.me/"+(cfg.wa||"");
  const ig="https://instagram.com/"+(cfg.ig||"").replace("@","");
  ["n-ig","f-ig-pill"].forEach(id=>document.getElementById(id).href=ig);
  ["n-wa","h-wa","f-wa-pill"].forEach(id=>document.getElementById(id).href=wa);
  document.getElementById("f-ig").textContent=cfg.ig||"";
}

function render(){
  renderSec("ra","Ropa Americana","g-ra","cnt-ra",subfilters.ra);
  renderSec("ss","Street Syndicate","g-ss","cnt-ss",subfilters.ss);
  renderSec("pe","Personalizaciones","g-pe","cnt-pe",subfilters.pe);
}

function filt(sec,btn,sub){
  subfilters[sec]=sub;
  btn.closest(".filters").querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  const map={ra:["Ropa Americana","g-ra","cnt-ra"],ss:["Street Syndicate","g-ss","cnt-ss"],pe:["Personalizaciones","g-pe","cnt-pe"]};
  const [cat,gid,cid]=map[sec];
  renderSec(sec,cat,gid,cid,sub);
}

function renderSec(sec,cat,gid,cid,sub){
  const items=metadata.filter(i=>{
    if(i.visible===false)return false;
    if(i.categoria!==cat)return false;
    if(sub&&i.categoria!==sub&&i.subcat!==sub){
      // filter by subcategory name match
      if(sub&&!i.nombre.toLowerCase().includes(''))return true; // show all for now
    }
    return true;
  });
  document.getElementById(cid).textContent=items.length+" prendas";
  const wa="https://wa.me/"+(cfg.wa||"");
  document.getElementById(gid).innerHTML=items.length
    ?items.map(item=>cardHTML(item,wa)).join("")
    :`<div style="grid-column:1/-1;padding:60px;text-align:center;color:#444;font-size:12px;letter-spacing:.1em">Sin prendas disponibles.</div>`;
}

function cardHTML(item,wa){
  const foto=photos[item.id]||"";
  const imgEl=foto
    ?`<img class="cimg" src="${foto}" alt="${item.nombre}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cph><div class=cph-ico>🐻</div></div>'">`
    :`<div class="cph"><div class="cph-ico">🐻</div><div class="cph-txt">${item.categoria||""}</div></div>`;
  const sold=item.vendida?`<div class="sold-badge">VENDIDA</div>`:"";
  const tallas=(item.tallas||[]).map(t=>`<span class="talla">${t}</span>`).join("");
  const msg=encodeURIComponent(`Hola! Me interesa: ${item.nombre} — $${item.precio} MXN`);
  const btn=!item.vendida
    ?`<button class="bwa-card" onclick="window.open('${wa}?text=${msg}','_blank')">💬 CONSULTAR</button>`
    :`<div style="text-align:center;font-size:11px;color:#555;padding:8px">Pieza agotada</div>`;
  return`<div class="card"><div class="cimgw">${imgEl}${sold}</div>
    <div class="cbody">
      <div class="ccat">${item.categoria||""}</div>
      <div class="cname">${item.nombre}</div>
      <div class="cbot"><div class="cprice">$${item.precio}</div><div class="ctallas">${tallas}</div></div>
      ${btn}</div></div>`;
}

init();
</script>
</body>
