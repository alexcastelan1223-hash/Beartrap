<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bear Trap — Admin</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#070708;--s:#0f0f11;--c:#141418;--b:#1e1e24;--t:#f0f0f0;--m:#666;--g:#ffc400;--or:#ff8c00;--gr:#00ff87;--pk:#ff2d78;--cy:#00c8ff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:"DM Mono",monospace;min-height:100vh}
input,select,textarea{font-family:inherit}
#ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lb{background:var(--s);border:1px solid var(--b);border-radius:4px;padding:44px;width:360px}
.lb-logo{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:.08em;margin-bottom:2px;background:linear-gradient(135deg,#ffdd00,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lb-sub{color:var(--m);font-size:11px;letter-spacing:.12em;margin-bottom:32px;text-transform:uppercase}
.lf label{display:block;font-size:10px;letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-bottom:6px}
.lf input{width:100%;padding:11px 12px;background:var(--c);border:1px solid var(--b);border-radius:2px;color:var(--t);font-size:13px;outline:none;transition:border .2s}
.lf input:focus{border-color:var(--g)}
#lerr{color:var(--pk);font-size:11px;margin:10px 0 4px;min-height:16px}
.lbtn{width:100%;padding:13px;margin-top:8px;background:linear-gradient(135deg,var(--g),var(--or));border:none;border-radius:2px;color:#000;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.1em;cursor:pointer;transition:opacity .2s}
.lbtn:hover{opacity:.88}
#as{display:none}
.stripe{height:3px;background:linear-gradient(90deg,#ff3b00,#ffcc00,#00e87a,#00c8ff,#b24bff,#ff2d78);background-size:200% 100%;animation:str 3s linear infinite}
@keyframes str{0%{background-position:0}100%{background-position:200%}}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:var(--s);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100}
.bar-l{display:flex;align-items:center;gap:10px}
.bar-logo{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:.06em;background:linear-gradient(135deg,#ffdd00,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bar-badge{padding:2px 8px;border-radius:10px;background:rgba(255,196,0,.1);border:1px solid rgba(255,196,0,.2);color:var(--g);font-size:10px;letter-spacing:.1em}
.bar-r{display:flex;gap:8px}
.bsm{padding:6px 14px;border-radius:2px;font-size:11px;letter-spacing:.08em;cursor:pointer;transition:all .2s;text-decoration:none;border:1px solid var(--b);background:transparent}
.bview{color:var(--cy);border-color:rgba(0,200,255,.2)}.bview:hover{background:rgba(0,200,255,.08)}
.bout{color:var(--m)}.bout:hover{border-color:var(--pk);color:var(--pk)}
.ac{max-width:1280px;margin:0 auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--s);border:1px solid var(--b);border-radius:3px;padding:18px}
.stat-v{font-family:"Bebas Neue",sans-serif;font-size:38px;color:var(--g)}
.stat-l{font-size:10px;letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-top:2px}
#sb{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:2px;margin-bottom:16px;font-size:11px;letter-spacing:.08em}
#sb.ok{background:rgba(0,255,135,.06);border:1px solid rgba(0,255,135,.2);color:var(--gr)}
#sb.er{background:rgba(255,45,120,.06);border:1px solid rgba(255,45,120,.2);color:var(--pk)}
#sb.ld{background:rgba(255,196,0,.06);border:1px solid rgba(255,196,0,.2);color:var(--g)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-ok{background:var(--gr)}.d-er{background:var(--pk)}.d-ld{background:var(--g);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:180px;padding:9px 12px;background:var(--s);border:1px solid var(--b);border-radius:2px;color:var(--t);font-size:12px;outline:none}
.srch:focus{border-color:var(--g)}
.sel{padding:9px 12px;background:var(--s);border:1px solid var(--b);border-radius:2px;color:var(--t);font-size:12px;cursor:pointer}
.badd{padding:9px 20px;background:linear-gradient(135deg,var(--g),var(--or));border:none;border-radius:2px;color:#000;font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:.08em;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.badd:hover{opacity:.88}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;color:var(--m);font-size:10px;letter-spacing:.1em;border-bottom:1px solid var(--b);font-weight:400;text-transform:uppercase}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}
.ti{width:46px;height:54px;object-fit:cover;border-radius:2px;background:#1a1a1a;display:block}
.tp{width:46px;height:54px;border-radius:2px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:18px}
.sw{position:relative;display:inline-block;width:36px;height:20px;cursor:pointer}
.sw input{display:none}
.st{position:absolute;inset:0;background:var(--b);border-radius:10px;transition:.2s}
.sw input:checked+.st{background:var(--gr)}
.sh{position:absolute;left:2px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.sw input:checked~.sh{left:18px}
.ab{padding:5px 10px;border-radius:2px;font-size:10px;font-family:inherit;letter-spacing:.08em;cursor:pointer;transition:all .2s;border:1px solid var(--b);background:transparent;color:var(--m)}
.ab:hover{border-color:var(--g);color:var(--g)}.ab.del:hover{border-color:var(--pk);color:var(--pk)}
.bsold{padding:2px 8px;border-radius:2px;background:linear-gradient(135deg,var(--pk),#b24bff);color:#fff;font-size:10px;letter-spacing:.08em}
#nr{display:none;padding:60px;text-align:center;color:var(--m);font-size:12px;letter-spacing:.1em}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mb{background:var(--s);border:1px solid var(--b);border-radius:4px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.mh{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.06em}
.mx{background:none;border:none;color:var(--m);font-size:22px;cursor:pointer}
.mbody{padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:10px;letter-spacing:.1em;color:var(--m);text-transform:uppercase}
.ff input,.ff select{padding:9px 10px;background:var(--c);border:1px solid var(--b);border-radius:2px;color:var(--t);font-size:12px;outline:none;transition:border .2s}
.ff input:focus,.ff select:focus{border-color:var(--g)}
.tgrid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tc{display:none}
.tl{padding:5px 10px;border:1px solid var(--b);border-radius:2px;font-size:11px;cursor:pointer;transition:all .2s;color:var(--m)}
.tc:checked+.tl{border-color:var(--g);color:var(--g);background:rgba(255,196,0,.06)}
.pimg{width:80px;height:96px;object-fit:cover;border-radius:2px;border:1px solid var(--b)}
.bsave{width:100%;padding:13px;background:linear-gradient(135deg,var(--g),var(--or));border:none;border-radius:2px;color:#000;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.08em;cursor:pointer;margin-top:14px;transition:opacity .2s}
.bsave:hover{opacity:.88}
.box{background:var(--s);border:1px solid var(--b);border-radius:3px;padding:20px;margin-top:18px}
.box-t{font-size:10px;letter-spacing:.15em;color:var(--m);text-transform:uppercase;margin-bottom:14px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cf label{display:block;font-size:10px;letter-spacing:.1em;color:var(--m);margin-bottom:5px}
.cf input{width:100%;padding:9px 10px;background:var(--c);border:1px solid var(--b);border-radius:2px;color:var(--t);font-size:12px;outline:none;transition:border .2s}
.cf input:focus{border-color:var(--g)}
.bconf{padding:9px 20px;background:linear-gradient(135deg,var(--g),var(--or));border:none;border-radius:2px;color:#000;font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:.08em;cursor:pointer}
.bexp{padding:9px 18px;background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.2);border-radius:2px;color:var(--cy);font-size:11px;cursor:pointer;transition:all .2s}
.bexp:hover{background:rgba(0,200,255,.16)}
.bimp{padding:9px 18px;background:rgba(255,196,0,.06);border:1px solid var(--b);border-radius:2px;color:var(--g);font-size:11px;cursor:pointer;transition:all .2s}
.bimp:hover{background:rgba(255,196,0,.14)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s);border:1px solid var(--b);color:var(--g);padding:12px 24px;border-radius:3px;font-size:11px;letter-spacing:.1em;transition:transform .3s;z-index:9999;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.cg{grid-template-columns:1fr}.tb{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<div id="ls">
  <div class="lb">
    <div class="lb-logo">🐻 BEAR TRAP</div>
    <div class="lb-sub">Panel de administración</div>
    <div class="lf">
      <label>Clave de acceso</label>
      <input type="password" id="pwd" placeholder="••••••••" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div id="lerr"></div>
    <button class="lbtn" onclick="doLogin()">ENTRAR</button>
  </div>
</div>

<div id="as">
  <div class="stripe"></div>
  <div class="bar">
    <div class="bar-l"><span class="bar-logo">🐻 BEAR TRAP</span><span class="bar-badge">PANEL</span></div>
    <div class="bar-r">
      <a href="/" class="bsm bview" target="_blank">→ VER SITIO</a>
      <button class="bsm bout" onclick="doLogout()">SALIR</button>
    </div>
  </div>
  <div class="ac">
    <div class="stats">
      <div class="stat"><div class="stat-v" id="st">0</div><div class="stat-l">Prendas</div></div>
      <div class="stat"><div class="stat-v" id="sv">0</div><div class="stat-l">Visibles</div></div>
      <div class="stat"><div class="stat-v" id="ss" style="color:var(--pk)">0</div><div class="stat-l">Vendidas</div></div>
      <div class="stat"><div class="stat-v" id="sa">$0</div><div class="stat-l">Precio Prom.</div></div>
    </div>
    <div id="sb" class="ld"><div class="dot d-ld" id="dot"></div><span id="sbt">Conectando...</span></div>
    <div class="tb">
      <input class="srch" type="text" id="q" placeholder="🔍 Buscar prenda..." oninput="renderT()">
      <select class="sel" id="fcat" onchange="renderT()">
        <option>Todas</option><option>Blusas</option><option>Suéteres</option><option>Chamarras</option>
        <option>Pantalones</option><option>Faldas</option><option>Vestidos</option><option>Shorts</option><option>Conjuntos</option>
      </select>
      <select class="sel" id="fvis" onchange="renderT()">
        <option value="">Todas</option><option value="1">Visibles</option><option value="0">Ocultas</option>
      </select>
      <button class="badd" onclick="openM()">+ AGREGAR</button>
    </div>
    <div class="tw">
      <table>
        <thead><tr><th>Foto</th><th>#</th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Tallas</th><th>Visible</th><th>Vendida</th><th>Acciones</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="nr">Sin resultados</div>
    <div class="box">
      <div class="box-t">⚙ Configuración del sitio</div>
      <div class="cg">
        <div class="cf"><label>Instagram (@usuario)</label><input id="ci" placeholder="@beartrap_mx"></div>
        <div class="cf"><label>WhatsApp (con código país)</label><input id="cw" placeholder="5215512345678"></div>
        <div class="cf"><label>Eslogan</label><input id="cs" placeholder="Ropa que atrapa."></div>
        <div class="cf"><label>Nueva clave de acceso</label><input type="password" id="cp" placeholder="Vacío = no cambiar" autocomplete="new-password"></div>
      </div>
      <button class="bconf" onclick="saveConf()">🐻 GUARDAR CONFIGURACIÓN</button>
    </div>
    <div class="box">
      <div class="box-t">💾 Respaldo de inventario</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="bexp" onclick="exportJ()">↓ Exportar JSON</button>
        <button class="bimp" onclick="document.getElementById('impf').click()">↑ Importar JSON</button>
        <input type="file" id="impf" accept=".json" style="display:none" onchange="importJ(this)">
      </div>
    </div>
  </div>
</div>

<div class="mo" id="modal">
  <div class="mb">
    <div class="mh"><div class="mt" id="mtitle">AGREGAR PRENDA</div><button class="mx" onclick="closeM()">✕</button></div>
    <div class="mbody">
      <div class="g2" style="margin-bottom:12px">
        <div class="ff"><label>Nombre</label><input id="fn" placeholder="Ej: Blusa floral"></div>
        <div class="ff"><label>Categoría</label>
          <select id="fc"><option>Blusas</option><option>Suéteres</option><option>Chamarras</option><option>Pantalones</option><option>Faldas</option><option>Vestidos</option><option>Shorts</option><option>Conjuntos</option></select>
        </div>
        <div class="ff"><label>Precio MXN</label><input type="number" id="fp" placeholder="150"></div>
        <div class="ff"><label>Color (opcional)</label><input id="fco" placeholder="Negro, Rosa..."></div>
      </div>
      <div class="ff" style="margin-bottom:12px">
        <label>Tallas</label>
        <div class="tgrid">
          <input type="checkbox" id="txs" class="tc" value="XS"><label for="txs" class="tl">XS</label>
          <input type="checkbox" id="tss" class="tc" value="S"><label for="tss" class="tl">S</label>
          <input type="checkbox" id="tms" class="tc" value="M"><label for="tms" class="tl">M</label>
          <input type="checkbox" id="tls" class="tc" value="L"><label for="tls" class="tl">L</label>
          <input type="checkbox" id="txls" class="tc" value="XL"><label for="txls" class="tl">XL</label>
          <input type="checkbox" id="txxl" class="tc" value="XXL"><label for="txxl" class="tl">XXL</label>
          <input type="checkbox" id="tu" class="tc" value="Única"><label for="tu" class="tl">Única</label>
        </div>
      </div>
      <div class="ff" style="margin-bottom:8px"><label>Foto de la prenda</label><input type="file" id="fph" accept="image/*" onchange="prevFoto(this)"></div>
      <div id="fpw" style="display:none;margin-bottom:12px"><img id="fpi" class="pimg" src="" alt=""></div>
      <button class="bsave" onclick="saveItem()">GUARDAR PRENDA</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const FB="https://bear-trap-bazar-default-rtdb.firebaseio.com";
const DEFAULT_HASH="ebc5e3a0873ab378661bcd01f28f5da920b6a6775d0453eb47c94405c22e3a34";
const TALLAS=["XS","S","M","L","XL","XXL","Única"];
const TIDS={XS:"txs",S:"tss",M:"tms",L:"tls",XL:"txls",XXL:"txxl","Única":"tu"};
let items=[],editIdx=null,cfg={ig:"@beartrap_mx",wa:"5215512345678",slogan:"Ropa que atrapa."},session=false,lockUntil=0,attempts=0,sTimer;
async function sha(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
async function doLogin(){
  const now=Date.now();
  if(now<lockUntil){document.getElementById("lerr").textContent=`Bloqueado ${Math.ceil((lockUntil-now)/1000)}s`;return;}
  const val=document.getElementById("pwd").value;if(!val)return;
  const h=await sha(val);const stored=localStorage.getItem("bt_pwh")||DEFAULT_HASH;
  if(h===stored){attempts=0;document.getElementById("ls").style.display="none";document.getElementById("as").style.display="block";session=true;startTimer();initAdmin();}
  else{attempts++;if(attempts>=5){lockUntil=Date.now()+120000;attempts=0;document.getElementById("lerr").textContent="Bloqueado 2 minutos";}else document.getElementById("lerr").textContent=`Clave incorrecta (${attempts}/5)`;document.getElementById("pwd").value="";}
}
function doLogout(){session=false;clearTimeout(sTimer);document.getElementById("as").style.display="none";document.getElementById("ls").style.display="flex";document.getElementById("pwd").value="";document.getElementById("lerr").textContent="";}
function startTimer(){clearTimeout(sTimer);sTimer=setTimeout(doLogout,30*60*1000);}
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&!session)doLogin();if(session){clearTimeout(sTimer);startTimer();}});
function setStatus(type,text){const sb=document.getElementById("sb");sb.className=type;document.getElementById("dot").className="dot d-"+type;document.getElementById("sbt").textContent=text;}
async function fbGet(p){const r=await fetch(`${FB}/${p}.json`,{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
async function fbPut(p,d){const r=await fetch(`${FB}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
async function initAdmin(){
  setStatus("ld","Conectando a Firebase...");
  try{const raw=await fbGet("items");if(raw&&typeof raw==="object"){items=Array.isArray(raw)?raw.filter(Boolean):Object.values(raw).filter(Boolean);}else items=[];const rc=await fbGet("config");if(rc){cfg={...cfg,...rc};applyConf();}setStatus("ok",`Firebase conectado ✓  ·  ${items.length} prendas`);updateStats();renderT();}
  catch(e){setStatus("er","Sin Firebase — "+e.message);const ls=localStorage.getItem("bt_items");if(ls){items=JSON.parse(ls);setStatus("er",`Sin Firebase · ${items.length} locales`);}updateStats();renderT();}
}
function applyConf(){document.getElementById("ci").value=cfg.ig||"";document.getElementById("cw").value=cfg.wa||"";document.getElementById("cs").value=cfg.slogan||"";}
function updateStats(){document.getElementById("st").textContent=items.length;document.getElementById("sv").textContent=items.filter(i=>i.visible!==false).length;document.getElementById("ss").textContent=items.filter(i=>i.vendida).length;const avg=items.length?Math.round(items.reduce((a,i)=>a+(+i.precio||0),0)/items.length):0;document.getElementById("sa").textContent="$"+avg;}
function renderT(){
  const q=document.getElementById("q").value.toLowerCase();const cat=document.getElementById("fcat").value;const vis=document.getElementById("fvis").value;
  const filt=items.filter(i=>{if(q&&!i.nombre.toLowerCase().includes(q))return false;if(cat!=="Todas"&&i.categoria!==cat)return false;if(vis==="1"&&i.visible===false)return false;if(vis==="0"&&i.visible!==false)return false;return true;});
  document.getElementById("nr").style.display=filt.length?"none":"block";
  document.getElementById("tbody").innerHTML=filt.map(item=>{const idx=items.indexOf(item);const img=item.foto?`<img class="ti" src="${item.foto}" loading="lazy" onerror="this.style.display='none'">`:`<div class="tp">🐻</div>`;return`<tr><td>${img}</td><td style="color:var(--m)">${idx+1}</td><td><strong>${item.nombre}</strong>${item.vendida?` <span class="bsold">VENDIDA</span>`:""}</td><td style="color:var(--m)">${item.categoria||""}</td><td style="color:var(--g)">$${item.precio}</td><td style="color:var(--m);font-size:11px">${(item.tallas||[]).join(", ")}</td><td><label class="sw"><input type="checkbox" ${item.visible!==false?"checked":""} onchange="toggleV(${idx},this.checked)"><div class="st"></div><div class="sh"></div></label></td><td><label class="sw"><input type="checkbox" ${item.vendida?"checked":""} onchange="toggleS(${idx},this.checked)"><div class="st"></div><div class="sh"></div></label></td><td style="display:flex;gap:6px"><button class="ab" onclick="openM(${idx})">✏ Editar</button><button class="ab del" onclick="delItem(${idx})">🗑</button></td></tr>`;}).join("");
}
async function toggleV(i,v){items[i].visible=v;await save();updateStats();toast("Visibilidad actualizada");}
async function toggleS(i,v){items[i].vendida=v;await save();updateStats();toast(v?"Marcada vendida":"Disponible");}
async function delItem(i){if(!confirm(`¿Borrar "${items[i].nombre}"?`))return;items.splice(i,1);await save();updateStats();renderT();toast("Eliminada");}
function openM(idx){
  editIdx=(idx!==undefined)?idx:null;
  document.getElementById("mtitle").textContent=editIdx!==null?"EDITAR PRENDA":"AGREGAR PRENDA";
  TALLAS.forEach(t=>{const el=document.getElementById(TIDS[t]);if(el)el.checked=false;});
  ["fn","fc","fp","fco"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fc").value="Blusas";document.getElementById("fpw").style.display="none";document.getElementById("fph").value="";
  if(editIdx!==null){const it=items[editIdx];document.getElementById("fn").value=it.nombre||"";document.getElementById("fc").value=it.categoria||"Blusas";document.getElementById("fp").value=it.precio||"";document.getElementById("fco").value=it.color||"";(it.tallas||[]).forEach(t=>{const el=document.getElementById(TIDS[t]);if(el)el.checked=true;});if(it.foto){document.getElementById("fpi").src=it.foto;document.getElementById("fpw").style.display="block";}}
  document.getElementById("modal").classList.add("open");
}
function closeM(){document.getElementById("modal").classList.remove("open");editIdx=null;}
function prevFoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById("fpi").src=e.target.result;document.getElementById("fpw").style.display="block";};r.readAsDataURL(f);}
async function saveItem(){
  const nombre=document.getElementById("fn").value.trim();if(!nombre){alert("Escribe el nombre");return;}
  const tallas=TALLAS.filter(t=>{const el=document.getElementById(TIDS[t]);return el&&el.checked;});
  const fi=document.getElementById("fph");let foto=editIdx!==null?(items[editIdx].foto||""):"";
  if(fi.files[0])foto=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(fi.files[0]);});
  const item={id:editIdx!==null?(items[editIdx].id||`i${Date.now()}`):`i${Date.now()}`,nombre,categoria:document.getElementById("fc").value,precio:parseInt(document.getElementById("fp").value)||0,color:document.getElementById("fco").value.trim(),tallas,foto,visible:true,vendida:editIdx!==null?(items[editIdx].vendida||false):false,orden:editIdx!==null?(items[editIdx].orden||0):items.length+1};
  if(editIdx!==null)items[editIdx]=item;else items.push(item);
  await save();updateStats();renderT();closeM();toast(editIdx!==null?"Prenda actualizada ✓":"Prenda agregada ✓");
}
async function save(){localStorage.setItem("bt_items",JSON.stringify(items));try{await fbPut("items",items);}catch(e){setStatus("er","Sin Firebase — guardado local");}}
async function saveConf(){
  const np=document.getElementById("cp").value.trim();cfg.ig=document.getElementById("ci").value.trim();cfg.wa=document.getElementById("cw").value.trim();cfg.slogan=document.getElementById("cs").value.trim();
  if(np){const h=await sha(np);localStorage.setItem("bt_pwh",h);document.getElementById("cp").value="";toast("Clave actualizada ✓");}
  try{await fbPut("config",cfg);}catch(e){}localStorage.setItem("bt_cfg",JSON.stringify(cfg));toast("Configuración guardada ✓");
}
function exportJ(){const b=new Blob([JSON.stringify({items,config:cfg},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`beartrap-${new Date().toISOString().slice(0,10)}.json`;a.click();toast("Exportado ✓");}
function importJ(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{try{const d=JSON.parse(e.target.result);if(d.items){items=d.items;if(d.config){cfg={...cfg,...d.config};applyConf();}await save();updateStats();renderT();toast(`Importado ✓  ${items.length} prendas`);}}catch(err){alert("Archivo inválido");}};r.readAsText(f);}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
</script>
</body>
