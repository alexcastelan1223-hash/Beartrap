<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bear Trap — Panel de gestión</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080809;--surface:#101012;--card:#16161a;--border:#222226;--text:#eee;--muted:#555;--gold:#ffc107;--orange:#ff8c00;--green:#00e676;--pink:#ff2d78;--cyan:#00c8ff}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:44px;width:360px;text-align:center}
.login-bear{margin-bottom:16px}
.login-title{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:.06em;margin-bottom:4px;
  background:linear-gradient(135deg,#ff8c00,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:28px}
.lf label{display:block;font-size:10px;letter-spacing:.12em;color:var(--muted);text-align:left;margin-bottom:6px;text-transform:uppercase}
.lf input{width:100%;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:4px;
  color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border .2s}
.lf input:focus{border-color:var(--gold)}
#lerr{color:var(--pink);font-size:11px;margin:10px 0 2px;min-height:16px}
.lbtn{width:100%;padding:13px;margin-top:8px;background:linear-gradient(135deg,#ffc107,#ff8c00);border:none;border-radius:4px;
  color:#000;font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.08em;cursor:pointer;transition:opacity .2s}
.lbtn:hover{opacity:.88}

/* ADMIN */
#admin{display:none}
.stripe{height:3px;background:linear-gradient(90deg,#ff3b30,#ff8c00,#34c759,#30d5c8,#af52de,#ff2d55);background-size:200%;animation:s 3s linear infinite}
@keyframes s{to{background-position:200%}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;
  background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tlogo{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:.1em;
  background:linear-gradient(135deg,#ff8c00,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tbadge{padding:2px 8px;border-radius:10px;background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.2);
  color:var(--gold);font-size:10px;letter-spacing:.1em;margin-left:8px;font-family:"DM Mono",monospace}
.tbr{display:flex;gap:8px;align-items:center}
.bsm{padding:6px 16px;border-radius:3px;font-size:11px;font-family:"DM Sans",sans-serif;font-weight:600;
  letter-spacing:.08em;cursor:pointer;transition:all .2s;text-decoration:none;border:1px solid var(--border)}
.bview{background:rgba(0,200,255,.08);color:var(--cyan);border-color:rgba(0,200,255,.2)}
.bview:hover{background:rgba(0,200,255,.15)}
.blogout{background:transparent;color:var(--muted);cursor:pointer}
.blogout:hover{border-color:var(--pink);color:var(--pink)}

.ac{max-width:1400px;margin:0 auto;padding:20px}

/* STATUS */
#sb{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:4px;margin-bottom:18px;font-size:11px;letter-spacing:.08em;font-family:"DM Mono",monospace}
#sb.ok{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);color:var(--green)}
#sb.err{background:rgba(255,45,120,.06);border:1px solid rgba(255,45,120,.2);color:var(--pink)}
#sb.loading{background:rgba(255,193,7,.06);border:1px solid rgba(255,193,7,.2);color:var(--gold)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dok{background:var(--green)}.derr{background:var(--pink)}.dload{background:var(--gold);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:18px}
.sv{font-family:"Bebas Neue",sans-serif;font-size:38px;color:var(--gold)}
.sl{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:2px}

/* TOOLBAR */
.tb{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.sbar{flex:1;min-width:180px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);
  border-radius:3px;color:var(--text);font-family:inherit;font-size:12px;outline:none}
.sbar:focus{border-color:var(--gold)}
.fsel{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:inherit;font-size:12px;cursor:pointer}
.badd{padding:9px 22px;background:linear-gradient(135deg,#ffc107,#ff8c00);border:none;border-radius:3px;
  color:#000;font-family:"Bebas Neue",sans-serif;font-size:17px;letter-spacing:.08em;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.badd:hover{opacity:.88}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;color:var(--muted);font-size:10px;letter-spacing:.1em;
  border-bottom:1px solid var(--border);font-weight:500;text-transform:uppercase;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}
.timg{width:44px;height:52px;object-fit:cover;border-radius:3px;display:block;background:#1a1a1e}
.tph{width:44px;height:52px;background:linear-gradient(135deg,#1a1a20,#222230);border-radius:3px;
  display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.5}

/* SWITCH */
.sw{position:relative;width:34px;height:18px;display:inline-block;cursor:pointer}
.sw input{display:none}
.sw-track{position:absolute;inset:0;border-radius:9px;background:var(--border);transition:.2s}
.sw input:checked+.sw-track{background:var(--green)}
.sw-thumb{position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.2s}
.sw input:checked~.sw-thumb{left:18px}

.abtn{padding:5px 10px;border-radius:3px;font-size:10px;font-family:inherit;letter-spacing:.06em;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap}
.abtn:hover{border-color:var(--gold);color:var(--gold)}
.adel:hover{border-color:var(--pink);color:var(--pink)}
.sold-badge{padding:2px 8px;border-radius:3px;background:linear-gradient(135deg,var(--pink),#9b27af);
  color:#fff;font-size:10px;letter-spacing:.06em;font-weight:600;margin-left:6px}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:2000;align-items:center;justify-content:center;padding:16px}
.mbg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.mhd{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.06em}
.mcls{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.mbody{padding:20px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.one{grid-template-columns:1fr}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.ff input,.ff select,.ff textarea{
  padding:9px 10px;background:var(--card);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border .2s}
.ff input:focus,.ff select:focus{border-color:var(--gold)}
.tallas-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tc{display:none}.tl{padding:5px 10px;border:1px solid var(--border);border-radius:3px;font-size:11px;cursor:pointer;transition:all .2s}
.tc:checked+.tl{border-color:var(--gold);color:var(--gold);background:rgba(255,193,7,.06)}
.prev-img{width:72px;height:88px;object-fit:cover;border-radius:3px;border:1px solid var(--border);margin-top:8px}
.msave{width:100%;padding:12px;background:linear-gradient(135deg,#ffc107,#ff8c00);border:none;border-radius:4px;
  color:#000;font-family:"Bebas Neue",sans-serif;font-size:19px;letter-spacing:.08em;cursor:pointer;margin-top:14px;transition:opacity .2s}
.msave:hover{opacity:.88}

/* CONFIG */
.cfg{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px;margin-top:20px}
.cfg-hdr{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cf label{display:block;font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
.cf input{width:100%;padding:9px 10px;background:var(--card);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border .2s}
.cf input:focus{border-color:var(--gold)}
.bsave-cfg{padding:10px 22px;background:linear-gradient(135deg,#ffc107,#ff8c00);border:none;border-radius:3px;
  color:#000;font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:.08em;cursor:pointer;transition:opacity .2s}
.bsave-cfg:hover{opacity:.88}

/* BACKUP */
.bkp{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px;margin-top:16px}
.bkp-hdr{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.bexp{padding:9px 18px;background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.2);border-radius:3px;color:var(--cyan);font-size:11px;cursor:pointer;transition:all .2s;font-family:inherit}
.bexp:hover{background:rgba(0,200,255,.16)}
.bimp{padding:9px 18px;background:rgba(255,193,7,.06);border:1px solid var(--border);border-radius:3px;color:var(--gold);font-size:11px;cursor:pointer;transition:all .2s;font-family:inherit}
.bimp:hover{background:rgba(255,193,7,.14)}
#empty{display:none;padding:50px;text-align:center;color:var(--muted);font-size:12px;letter-spacing:.1em}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);
  color:var(--gold);padding:11px 22px;border-radius:3px;font-size:11px;letter-spacing:.1em;transition:transform .3s;z-index:9999;white-space:nowrap;font-family:"DM Mono",monospace}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.sg{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr}.cgrid{grid-template-columns:1fr}.tb{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-bear">
      <svg width="52" height="52" viewBox="0 0 40 40" fill="none">
        <circle cx="11" cy="10" r="8" fill="url(#lb)"/>
        <circle cx="29" cy="10" r="8" fill="url(#lb)"/>
        <rect x="5" y="14" width="30" height="22" rx="10" fill="url(#lb)"/>
        <circle cx="14" cy="22" r="3" fill="#1a1a1a"/>
        <circle cx="26" cy="22" r="3" fill="#1a1a1a"/>
        <circle cx="14.8" cy="21" r="1.2" fill="white" opacity=".7"/>
        <circle cx="26.8" cy="21" r="1.2" fill="white" opacity=".7"/>
        <circle cx="20" cy="28.5" r="2.5" fill="#1a1a1a"/>
        <defs><linearGradient id="lb" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ff6b35"/><stop offset="50%" stop-color="#ffd600"/>
          <stop offset="100%" stop-color="#00ff87"/>
        </linearGradient></defs>
      </svg>
    </div>
    <div class="login-title">🐻 BEAR TRAP</div>
    <div class="login-sub">PANEL DE GESTIÓN</div>
    <div class="lf">
      <label>Clave de acceso</label>
      <input type="password" id="pwd" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div id="lerr"></div>
    <button class="lbtn" onclick="doLogin()">ENTRAR</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <div class="stripe"></div>
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <span class="tlogo">🐻 BEAR TRAP</span>
      <span class="tbadge">ADMIN</span>
    </div>
    <div class="tbr">
      <a href="/" class="bsm bview" target="_blank">→ VER SITIO</a>
      <button class="bsm blogout" onclick="doLogout()">SALIR</button>
    </div>
  </div>

  <div class="ac">
    <div class="sg">
      <div class="sc"><div class="sv" id="st">0</div><div class="sl">Total prendas</div></div>
      <div class="sc"><div class="sv" id="sv">0</div><div class="sl">Visibles</div></div>
      <div class="sc"><div class="sv" id="ss" style="color:var(--pink)">0</div><div class="sl">Vendidas</div></div>
      <div class="sc"><div class="sv" id="sp">$0</div><div class="sl">Precio promedio</div></div>
    </div>

    <div id="sb" class="loading">
      <div class="dot dload" id="sd"></div>
      <span id="stxt">Conectando a Firebase...</span>
    </div>

    <div class="tb">
      <input class="sbar" type="text" placeholder="🔍 Buscar..." id="search" oninput="render()">
      <select class="fsel" id="fcat" onchange="render()">
        <option>Todas las categorías</option>
        <option>Ropa Americana</option><option>Street Syndicate</option><option>Personalizaciones</option>
      </select>
      <select class="fsel" id="fvis" onchange="render()">
        <option value="">Todas</option><option value="true">Visibles</option><option value="false">Ocultas</option>
      </select>
      <button class="badd" onclick="openModal()">+ AGREGAR</button>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>FOTO</th><th>#</th><th>PRENDA</th><th>CATEGORÍA</th>
          <th>PRECIO</th><th>TALLAS</th><th>VISIBLE</th><th>VENDIDA</th><th>ACCIONES</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="empty">Sin resultados</div>

    <!-- CONFIG -->
    <div class="cfg">
      <div class="cfg-hdr">⚙ CONFIGURACIÓN DEL SITIO</div>
      <div class="cgrid">
        <div class="cf"><label>Instagram</label><input id="c-ig" placeholder="@beartrap_mx"></div>
        <div class="cf"><label>WhatsApp (con código)</label><input id="c-wa" placeholder="5215512345678"></div>
        <div class="cf"><label>Eslogan</label><input id="c-sl" placeholder="Ropa que atrapa."></div>
        <div class="cf"><label>Nueva clave (opcional)</label><input type="password" id="c-pwd" autocomplete="new-password" placeholder="Dejar vacío = no cambiar"></div>
      </div>
      <button class="bsave-cfg" onclick="saveConfig()">GUARDAR CONFIGURACIÓN</button>
    </div>

    <!-- BACKUP -->
    <div class="bkp">
      <div class="bkp-hdr">💾 RESPALDO DE INVENTARIO</div>
      <div style="display:flex;gap:8px">
        <button class="bexp" onclick="exportJSON()">↓ Exportar JSON</button>
        <button class="bimp" onclick="document.getElementById('imp').click()">↑ Importar JSON</button>
        <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(this)">
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="modal">
  <div class="modal">
    <div class="mhd">
      <div class="mtitle" id="mtitle">AGREGAR PRENDA</div>
      <button class="mcls" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody">
      <div class="fg">
        <div class="ff"><label>Nombre</label><input id="f-n" placeholder="Blusa floral vintage"></div>
        <div class="ff"><label>Categoría</label>
          <select id="f-c"><option>Ropa Americana</option><option>Street Syndicate</option><option>Personalizaciones</option></select>
        </div>
        <div class="ff"><label>Precio (MXN)</label><input type="number" id="f-p" placeholder="150"></div>
        <div class="ff"><label>Color (opcional)</label><input id="f-col" placeholder="Negro, Rosa..."></div>
      </div>
      <div class="ff" style="margin-bottom:12px">
        <label>Tallas</label>
        <div class="tallas-row">
          <input type="checkbox" id="t-xs" class="tc" value="XS"><label for="t-xs" class="tl">XS</label>
          <input type="checkbox" id="t-s" class="tc" value="S"><label for="t-s" class="tl">S</label>
          <input type="checkbox" id="t-m" class="tc" value="M"><label for="t-m" class="tl">M</label>
          <input type="checkbox" id="t-l" class="tc" value="L"><label for="t-l" class="tl">L</label>
          <input type="checkbox" id="t-xl" class="tc" value="XL"><label for="t-xl" class="tl">XL</label>
          <input type="checkbox" id="t-xxl" class="tc" value="XXL"><label for="t-xxl" class="tl">XXL</label>
          <input type="checkbox" id="t-u" class="tc" value="Única"><label for="t-u" class="tl">Única</label>
        </div>
      </div>
      <div class="ff fg one" style="margin-bottom:8px">
        <label>Foto de la prenda</label>
        <input type="file" id="f-foto" accept="image/*" onchange="prevFoto(this)">
      </div>
      <img id="f-prev" class="prev-img" src="" style="display:none">
      <button class="msave" onclick="saveItem()">GUARDAR PRENDA</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const FB = "https://bear-trap-bazar-default-rtdb.firebaseio.com";
const H0 = "ebc5e3a0873ab378661bcd01f28f5da920b6a6775d0453eb47c94405c22e3a34";
const TALLAS = ["XS","S","M","L","XL","XXL","Única"];
const TIDS = {"XS":"t-xs","S":"t-s","M":"t-m","L":"t-l","XL":"t-xl","XXL":"t-xxl","Única":"t-u"};

let items = [], cfg = {ig:"@beartrap_mx",wa:"5215512345678",slogan:"Ropa que atrapa."};
let editIdx = null, session=false, lock=0, tries=0, timer;

// AUTH
async function h(s){const e=new TextEncoder(),b=await crypto.subtle.digest("SHA-256",e.encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("")}
async function doLogin(){
  if(Date.now()<lock){document.getElementById("lerr").textContent=`Bloqueado ${Math.ceil((lock-Date.now())/1000)}s`;return}
  const v=document.getElementById("pwd").value;if(!v)return;
  const hv=await h(v),hs=localStorage.getItem("bt_pwh")||H0;
  if(hv===hs){tries=0;document.getElementById("login").style.display="none";document.getElementById("admin").style.display="block";session=true;resetTimer();initAdmin();}
  else{tries++;if(tries>=5){lock=Date.now()+120000;tries=0;document.getElementById("lerr").textContent="Bloqueado 2 min";}else document.getElementById("lerr").textContent=`Incorrecto (${tries}/5)`;document.getElementById("pwd").value="";}
}
function doLogout(){session=false;clearTimeout(timer);document.getElementById("admin").style.display="none";document.getElementById("login").style.display="flex";document.getElementById("pwd").value="";document.getElementById("lerr").textContent="";}
function resetTimer(){clearTimeout(timer);timer=setTimeout(doLogout,30*60*1000)}
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&!session)doLogin();if(session)resetTimer();});

// STATUS
function setStatus(type,text){const b=document.getElementById("sb"),d=document.getElementById("sd"),t=document.getElementById("stxt");b.className=type;d.className="dot d"+type;t.textContent=text;}

// FIREBASE
async function fbGet(p){const r=await fetch(`${FB}/${p}.json`,{cache:"no-store"});if(!r.ok)throw Error(r.status);return r.json();}
async function fbSet(p,d){const r=await fetch(`${FB}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});if(!r.ok)throw Error(r.status);}

// INIT
async function initAdmin(){
  setStatus("loading","Conectando a Firebase...");
  try{
    const raw=await fbGet("items");
    if(raw)items=(Array.isArray(raw)?raw:Object.values(raw)).filter(Boolean);
    const c=await fbGet("config");
    if(c){cfg={...cfg,...c};applyConfig();}
    setStatus("ok",`Firebase conectado ✓  •  ${items.length} prendas`);
  }catch(e){
    setStatus("err","Sin Firebase — cargando local");
    const s=localStorage.getItem("bt_items");
    if(s)items=JSON.parse(s);
  }
  updateStats();render();
}

function applyConfig(){document.getElementById("c-ig").value=cfg.ig||"";document.getElementById("c-wa").value=cfg.wa||"";document.getElementById("c-sl").value=cfg.slogan||"";}
function updateStats(){
  document.getElementById("st").textContent=items.length;
  document.getElementById("sv").textContent=items.filter(i=>i.visible!==false).length;
  document.getElementById("ss").textContent=items.filter(i=>i.vendida).length;
  const avg=items.length?Math.round(items.reduce((a,i)=>a+(+i.precio||0),0)/items.length):0;
  document.getElementById("sp").textContent="$"+avg;
}

// TABLE
function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const cat=document.getElementById("fcat").value;
  const vis=document.getElementById("fvis").value;
  let f=items.filter(i=>{
    if(q&&!i.nombre.toLowerCase().includes(q))return false;
    if(cat!=="Todas las categorías"&&i.categoria!==cat)return false;
    if(vis!==""&&String(i.visible!==false)!==vis)return false;
    return true;
  });
  document.getElementById("empty").style.display=f.length?"none":"block";
  document.getElementById("tbody").innerHTML=f.map(item=>{
    const ri=items.indexOf(item);
    const img=item.foto?`<img class="timg" src="${item.foto}" loading="lazy" onerror="this.style.display='none'">`:`<div class="tph">🐻</div>`;
    const tallas=(item.tallas||[]).join(", ");
    return`<tr>
      <td>${img}</td>
      <td style="color:var(--muted)">${ri+1}</td>
      <td><strong>${item.nombre}</strong>${item.vendida?`<span class="sold-badge">VENDIDA</span>`:""}</td>
      <td style="color:var(--muted)">${item.categoria||""}</td>
      <td style="color:var(--gold);font-family:Bebas Neue,sans-serif;font-size:18px">$${item.precio}</td>
      <td style="color:var(--muted);font-size:11px">${tallas}</td>
      <td><label class="sw"><input type="checkbox" ${item.visible!==false?"checked":""} onchange="toggleV(${ri},this.checked)"><div class="sw-track"></div><div class="sw-thumb"></div></label></td>
      <td><label class="sw"><input type="checkbox" ${item.vendida?"checked":""} onchange="toggleS(${ri},this.checked)"><div class="sw-track"></div><div class="sw-thumb"></div></label></td>
      <td style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="abtn" onclick="openModal(${ri})">✏ Editar</button>
        <button class="abtn adel" onclick="del(${ri})">🗑</button>
      </td>
    </tr>`;
  }).join("");
}

async function toggleV(i,v){items[i].visible=v;await save();updateStats();toast("Visibilidad actualizada");}
async function toggleS(i,v){items[i].vendida=v;await save();updateStats();toast(v?"Marcada como vendida":"Disponible");}
async function del(i){if(!confirm(`¿Borrar "${items[i].nombre}"?`))return;items.splice(i,1);await save();updateStats();render();toast("Eliminada");}

// MODAL
function openModal(idx){
  editIdx=idx!==undefined?idx:null;
  document.getElementById("mtitle").textContent=editIdx!==null?"EDITAR PRENDA":"AGREGAR PRENDA";
  TALLAS.forEach(t=>{const el=document.getElementById(TIDS[t]);if(el)el.checked=false;});
  ["f-n","f-col"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-p").value="";
  document.getElementById("f-c").value="Ropa Americana";
  document.getElementById("f-prev").style.display="none";
  if(editIdx!==null){
    const it=items[editIdx];
    document.getElementById("f-n").value=it.nombre||"";
    document.getElementById("f-c").value=it.categoria||"Ropa Americana";
    document.getElementById("f-p").value=it.precio||"";
    document.getElementById("f-col").value=it.color||"";
    (it.tallas||[]).forEach(t=>{const el=document.getElementById(TIDS[t]);if(el)el.checked=true;});
    if(it.foto){document.getElementById("f-prev").src=it.foto;document.getElementById("f-prev").style.display="block";}
  }
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");editIdx=null;}
function prevFoto(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById("f-prev").src=e.target.result;document.getElementById("f-prev").style.display="block";};r.readAsDataURL(f);}

async function saveItem(){
  const nombre=document.getElementById("f-n").value.trim();
  if(!nombre){alert("Escribe el nombre");return;}
  const tallas=TALLAS.filter(t=>{const el=document.getElementById(TIDS[t]);return el&&el.checked;});
  const fi=document.getElementById("f-foto");
  let foto=editIdx!==null?(items[editIdx].foto||""):"";
  if(fi.files[0])foto=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(fi.files[0]);});
  const item={
    id:editIdx!==null?(items[editIdx].id||`item_${Date.now()}`):(`item_${Date.now()}`),
    nombre,categoria:document.getElementById("f-c").value,
    precio:parseInt(document.getElementById("f-p").value)||0,
    color:document.getElementById("f-col").value.trim(),
    tallas,foto,
    visible:editIdx!==null?(items[editIdx].visible!==false):true,
    vendida:editIdx!==null?(items[editIdx].vendida||false):false,
    orden:editIdx!==null?(items[editIdx].orden||0):items.length+1
  };
  if(editIdx!==null)items[editIdx]=item;else items.push(item);
  await save();updateStats();render();closeModal();
  toast(editIdx!==null?"Prenda actualizada ✓":"Prenda agregada ✓");
}

// SAVE
async function save(){
  localStorage.setItem("bt_items",JSON.stringify(items));
  try{await fbSet("items",items);}
  catch(e){setStatus("err","Error guardando en Firebase");}
}

// CONFIG
async function saveConfig(){
  const np=document.getElementById("c-pwd").value.trim();
  cfg.ig=document.getElementById("c-ig").value.trim();
  cfg.wa=document.getElementById("c-wa").value.trim();
  cfg.slogan=document.getElementById("c-sl").value.trim();
  if(np){const hsh=await h(np);localStorage.setItem("bt_pwh",hsh);document.getElementById("c-pwd").value="";toast("Clave actualizada ✓");}
  try{await fbSet("config",cfg);}catch(e){}
  localStorage.setItem("bt_cfg",JSON.stringify(cfg));
  toast("Configuración guardada ✓");
}

// BACKUP
function exportJSON(){
  const b=new Blob([JSON.stringify({items,config:cfg},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);
  a.download=`beartrap-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast("Exportado ✓");
}
function importJSON(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{try{const d=JSON.parse(e.target.result);if(d.items){items=d.items;if(d.config){cfg={...cfg,...d.config};applyConfig();}await save();updateStats();render();toast("Importado ✓ "+items.length+" prendas");}else alert("Archivo inválido");}catch{alert("Error al leer el archivo");}};
  r.readAsText(f);
}

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
</script>
</body>
</html>
